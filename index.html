<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saco Handshake</title>
</head>
<body style="background: #121212; color: white; text-align: center; padding: 50px;">
    <button id="btn" style="padding: 20px 40px; font-size: 20px;">TEST CONNECTION</button>
    <p id="status">Ready</p>

    <script>
        const SHEET_URL = 'YOUR_GOOGLE_SCRIPT_URL_HERE';
        const btn = document.getElementById('btn');
        const status = document.getElementById('status');

        btn.onclick = async () => {
            status.innerText = "Sending Ping...";
            try {
                // Testing a basic connection without the audio payload
                await fetch(SHEET_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'test=ping'
                });
                status.innerText = "Check Google Sheet!";
            } catch (e) {
                status.innerText = "Connection Failed: " + e.message;
            }
        };
    </script>
</body>
</html>
