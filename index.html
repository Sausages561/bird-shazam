<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saco Bird Logger</title>
    <style>
        body { background: #121212; color: white; font-family: -apple-system, sans-serif; text-align: center; padding: 20px; }
        #btn { width: 180px; height: 180px; border-radius: 50%; border: none; background: #1DB954; color: white; font-size: 22px; font-weight: bold; margin-top: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #status { color: #b3b3b3; margin: 20px; font-size: 14px; }
    </style>
</head>
<body>
    <h1>Saco Bird Logger</h1>
    <button id="btn">LISTEN</button>
    <p id="status">Ready</p>

    <script>
        const SHEET_URL = 'https://script.google.com/macros/s/AKfycbw8ORpLgu2kjM0_d5bweCgiJAV6GpAWqHfKMhjAc2X-3QY4rbqtx7DWQkmISif8Kw59/exec';
        const btn = document.getElementById('btn');
        const status = document.getElementById('status');

        btn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const recorder = new MediaRecorder(stream);
                const chunks = [];
                
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = async () => {
                    status.innerText = "Transmitting to Google...";
                    const blob = new Blob(chunks, { type: 'audio/wav' });
                    const reader = new FileReader();
                    reader.readAsDataURL(blob);
                    reader.onloadend = async () => {
                        const base64 = reader.result.split(',')[1];
                        
                        // Send audio string directly to your Google Script
                        await fetch(SHEET_URL, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                            body: 'audio=' + encodeURIComponent(base64)
                        });
                        status.innerText = "Check Google Sheet for ID!";
                    };
                };

                recorder.start();
                btn.style.background = "#ff4444";
                status.innerText = "Recording...";
                setTimeout(() => { 
                    recorder.stop(); 
                    stream.getTracks().forEach(t => t.stop()); 
                    btn.style.background = "#1DB954"; 
                }, 5000);
            } catch (e) { status.innerText = "Mic Error: Check Safari Settings"; }
        };
    </script>
</body>
</html>
