<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saco Bird Logger</title>
    <style>
        :root { --green: #1DB954; --bg: #121212; --card: #1e1e1e; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 450px; margin: auto; }
        #recordBtn { 
            width: 180px; height: 180px; border-radius: 50%; border: none; 
            background: var(--green); color: white; font-size: 22px; font-weight: bold;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); cursor: pointer; margin-top: 40px;
            -webkit-tap-highlight-color: transparent;
        }
        #recordBtn:active { transform: scale(0.95); }
        #status { font-weight: 300; color: #b3b3b3; margin: 30px 0; min-height: 1.5em; font-size: 14px; }
        .entry { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 12px; border-left: 5px solid var(--green); text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bird Journal</h1>
        <button id="recordBtn">LISTEN</button>
        <h2 id="status">Ready to log in Saco</h2>
        <div id="history"><h3>Recent Sightings</h3></div>
    </div>

    <script>
        const SHEET_URL = 'https://script.google.com/macros/s/AKfycbw8ORpLgu2kjM0_d5bweCgiJAV6GpAWqHfKMhjAc2X-3QY4rbqtx7DWQkmISif8Kw59/exec';

        const recordBtn = document.getElementById('recordBtn');
        const statusText = document.getElementById('status');
        const historyDiv = document.getElementById('history');
        
        let isRecording = false;
        let mediaRecorder;
        let audioChunks = [];

        recordBtn.onclick = async () => {
            if (isRecording) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: 'audio/wav' });
                    analyzeAndLog(blob);
                };
                mediaRecorder.start();
                isRecording = true;
                recordBtn.innerText = "RECORDING";
                recordBtn.style.background = "#ff4444";
                statusText.innerText = "Listening for 5 seconds...";
                setTimeout(() => { if (mediaRecorder.state === "recording") { mediaRecorder.stop(); stream.getTracks().forEach(t => t.stop()); } }, 5000);
            } catch (err) { statusText.innerText = "Mic Error: Check Safari Permissions"; }
        };

        async function analyzeAndLog(blob) {
            recordBtn.innerText = "WAIT";
            statusText.innerText = "Identifying...";
            
            const formData = new FormData();
            formData.append('audio', blob, 'recording.wav');

            try {
                // Phase 1: BirdNET Identification
                const response = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent('https://birdnet.cornell.edu/api/v1/analyze'), { 
                    method: 'POST', 
                    body: formData 
                });
                
                const rawText = await response.text();
                const jsonMatch = rawText.match(/\{[\s\S]*\}/);
                
                if (jsonMatch) {
                    const birdData = JSON.parse(jsonMatch[0]);
                    if (birdData.results && birdData.results.length > 0) {
                        const name = birdData.results[0].species_common_name;
                        const conf = Math.round(birdData.results[0].confidence * 100);
                        statusText.innerText = `${name} (${conf}%)`;

                        // Phase 2: Log actual result to Google Sheet
                        fetch(`${SHEET_URL}?bird=${encodeURIComponent(name)}&confidence=${conf}&audioUrl=App-Success`, {
                            method: 'GET',
                            mode: 'no-cors'
                        });

                        updateUI(name, conf);
                        return;
                    }
                }
                statusText.innerText = "No bird detected.";
            } catch (e) { 
                statusText.innerText = "Server Busy. Logging attempt..."; 
                // Fallback: Log that an attempt was made even if ID failed
                fetch(`${SHEET_URL}?bird=Unknown&confidence=0&audioUrl=Retry-Later`, {
                    method: 'GET',
                    mode: 'no-cors'
                });
            } finally { 
                recordBtn.innerText = "LISTEN"; 
                recordBtn.style.background = "var(--green)"; 
                isRecording = false; 
            }
        }

        function updateUI(name, conf) {
            const entry = document.createElement('div');
            entry.className = 'entry';
            entry.innerHTML = `<b>${name} (${conf}%)</b><br><small>${new Date().toLocaleTimeString()}</small>`;
            historyDiv.insertBefore(entry, historyDiv.firstChild.nextSibling);
        }
    </script>
</body>
</html>
