<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saco Bird Logger</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        #btn { width: 180px; height: 180px; border-radius: 50%; border: none; background: #1DB954; color: white; font-size: 22px; font-weight: bold; margin-top: 40px; }
        #status { color: #b3b3b3; margin: 20px; font-size: 14px; }
    </style>
</head>
<body>
    <h1>Bird Logger</h1>
    <button id="btn">LISTEN</button>
    <p id="status">Ready</p>

    <script>
        const SHEET_URL = 'https://script.google.com/macros/s/AKfycbw8ORpLgu2kjM0_d5bweCgiJAV6GpAWqHfKMhjAc2X-3QY4rbqtx7DWQkmISif8Kw59/exec';
        const btn = document.getElementById('btn');
        const status = document.getElementById('status');

        btn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const recorder = new MediaRecorder(stream);
                const chunks = [];
                
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = async () => {
                    status.innerText = "Processing...";
                    const blob = new Blob(chunks, { type: 'audio/wav' });
                    const fd = new FormData();
                    fd.append('audio', blob, 'rec.wav');

                    try {
                        // Use a different proxy gateway
                        const res = await fetch('https://corsproxy.io/?' + encodeURIComponent('https://birdnet.cornell.edu/api/v1/analyze'), {
                            method: 'POST',
                            body: fd
                        });
                        const data = await res.json();
                        
                        if (data.results && data.results[0]) {
                            const bird = data.results[0].species_common_name;
                            const conf = Math.round(data.results[0].confidence * 100);
                            status.innerText = bird + " (" + conf + "%)";
                            
                            // Log to Google Sheet
                            fetch(`${SHEET_URL}?bird=${encodeURIComponent(bird)}&confidence=${conf}&audioUrl=Live`, { mode: 'no-cors' });
                        } else {
                            status.innerText = "No birds detected.";
                        }
                    } catch (e) {
                        status.innerText = "Network interference. Try toggling wifi.";
                    }
                };

                recorder.start();
                btn.style.background = "#ff4444";
                status.innerText = "Recording...";
                setTimeout(() => { recorder.stop(); stream.getTracks().forEach(t=>t.stop()); btn.style.background = "#1DB954"; }, 5000);
            } catch (e) { status.innerText = "Mic Error: Allow access in settings."; }
        };
    </script>
</body>
</html>
