<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saco Link Test</title>
</head>
<body style="background:#121212; color:white; text-align:center; padding:50px;">
    <h2>Saco Link Test</h2>
    <button id="btn" style="padding:20px; font-size:20px;">SEND PING</button>
    <p id="status">Ready</p>

    <script>
        // PASTE THE NEW URL FROM THE CLEAN DEPLOYMENT HERE
        const SHEET_URL = 'YOUR_NEW_URL_HERE'; 
        
        document.getElementById('btn').onclick = async () => {
            const status = document.getElementById('status');
            status.innerText = "Sending Ping...";
            try {
                // The most basic POST request possible
                await fetch(SHEET_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: "Ping from Saco"
                });
                status.innerText = "Sent! Check Sheet.";
            } catch (e) {
                status.innerText = "Browser Blocked: " + e.message;
            }
        };
    </script>
</body>
</html>
