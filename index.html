<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saco Bird Logger</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        #btn { width: 180px; height: 180px; border-radius: 50%; border: none; background: #1DB954; color: white; font-size: 22px; font-weight: bold; margin-top: 40px; }
        #status { color: #b3b3b3; margin: 20px; font-size: 14px; }
    </style>
</head>
<body>
    <h1>Bird Logger (Proxy Mode)</h1>
    <button id="btn">LISTEN</button>
    <p id="status">Ready</p>

    <script>
        const btn = document.getElementById('btn');
        const status = document.getElementById('status');

        btn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const recorder = new MediaRecorder(stream);
                const chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = async () => {
                    status.innerText = "Bypassing Firewall...";
                    const blob = new Blob(chunks, { type: 'audio/wav' });
                    const formData = new FormData();
                    formData.append('audio', blob);

                    // Using a proxy to hide the Cornell destination from the firewall
                    const proxyUrl = 'https://cors-anywhere.herokuapp.com/';
                    const targetUrl = 'https://birdnet.cornell.edu/api/v1/analyze';

                    try {
                        const response = await fetch(proxyUrl + targetUrl, {
                            method: 'POST',
                            headers: { 'X-Requested-With': 'XMLHttpRequest' },
                            body: formData
                        });
                        const result = await response.json();
                        status.innerText = "Result: " + (result.results[0]?.species_common_name || "No Bird Found");
                    } catch (err) {
                        status.innerText = "Proxy Blocked. Try toggling Wi-Fi.";
                    }
                };
                recorder.start();
                btn.style.background = "#ff4444";
                setTimeout(() => { recorder.stop(); stream.getTracks().forEach(t=>t.stop()); btn.style.background = "#1DB954"; }, 5000);
            } catch (e) { status.innerText = "Mic Error"; }
        };
    </script>
</body>
</html>
