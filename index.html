<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bird Shazam</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { 
            background: #121212; 
            color: white; 
            text-align: center; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        #recordBtn { 
            width: 220px; 
            height: 220px; 
            border-radius: 50%; 
            border: none; 
            background: #1DB954; 
            color: white; 
            font-size: 26px; 
            font-weight: bold;
            cursor: pointer; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            -webkit-tap-highlight-color: transparent;
        }
        #recordBtn:active { transform: scale(0.95); background: #1ed760; }
        h1 { margin-bottom: 10px; font-size: 32px; letter-spacing: -1px; }
        h2 { font-weight: 300; color: #b3b3b3; margin-top: 25px; min-height: 1.5em; }
    </style>
</head>
<body>

    <h1>Bird ID</h1>
    <button id="recordBtn">LISTEN</button>
    <h2 id="result">Ready to identify</h2>

    <!-- THE LINK: This MUST be the last thing before the </body> tag -->
    <script src="app.js"></script>
</body>
</html>
