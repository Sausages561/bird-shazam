<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saco Bird Logger</title>
    <style>
        body { background:#121212; color:white; text-align:center; padding:50px; font-family:sans-serif; }
        #btn { width:200px; height:200px; border-radius:50%; background:#1DB954; color:white; border:none; font-size:24px; font-weight:bold; }
        #status { margin-top:20px; color: #aaa; }
    </style>
</head>
<body>
    <h2>Saco Bird Logger</h2>
    <button id="btn">LISTEN</button>
    <p id="status">Ready</p>

    <script>
        const GOOGLE_URL = 'https://script.google.com/macros/s/AKfycbw8ORpLgu2kjM0_d5bweCgiJAV6GpAWqHfKMhjAc2X-3QY4rbqtx7DWQkmISif8Kw59/exec';
        // Using a public proxy to avoid the 405/CORS errors
        const BIRDNET_URL = 'https://cors-anywhere.herokuapp.com/https://birdnet.cornell.edu/api/v1/analyze';
        
        const btn = document.getElementById('btn');
        const status = document.getElementById('status');

        btn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const recorder = new MediaRecorder(stream);
                const chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = async () => {
                    status.innerText = "Analyzing via Proxy...";
                    const blob = new Blob(chunks, { type: 'audio/wav' });
                    const formData = new FormData();
                    formData.append('audio', blob);

                    // 1. Try Cornell via Proxy
                    try {
                        const response = await fetch(BIRDNET_URL, { 
                            method: 'POST', 
                            body: formData,
                            headers: { 'X-Requested-With': 'XMLHttpRequest' }
                        });
                        const result = await response.json();
                        const bird = result.results?.[0]?.species_common_name || "No bird detected";
                        const conf = Math.round((result.results?.[0]?.confidence || 0) * 100);

                        // 2. Log Result to Google
                        status.innerText = "Logging to Sheet...";
                        await fetch(GOOGLE_URL, {
                            method: 'POST',
                            mode: 'no-cors',
                            body: JSON.stringify({ bird: bird, conf: conf })
                        });
                        status.innerText = bird + " (" + conf + "%) Saved!";
                    } catch (err) {
                        status.innerText = "Proxy Error. Try again.";
                    }
                };
                recorder.start();
                btn.style.background = "#ff4444";
                setTimeout(() => { recorder.stop(); stream.getTracks().forEach(t=>t.stop()); btn.style.background = "#1DB954"; }, 3000);
            } catch (e) { status.innerText = "Mic Error: " + e.message; }
        };
    </script>
</body>
</html>
