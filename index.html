<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saco Bird Logger</title>
    <style>
        :root { --green: #1DB954; --bg: #121212; --card: #1e1e1e; }
        body { 
            background: var(--bg); color: white; font-family: -apple-system, sans-serif; 
            text-align: center; padding: 20px; margin: 0;
        }
        .container { max-width: 450px; margin: auto; }
        #recordBtn { 
            width: 200px; height: 200px; border-radius: 50%; border: none; 
            background: var(--green); color: white; font-size: 24px; font-weight: bold;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); cursor: pointer; margin-top: 40px;
            transition: all 0.2s ease; -webkit-tap-highlight-color: transparent;
        }
        #recordBtn:active { transform: scale(0.92); filter: brightness(1.2); }
        #status { font-weight: 300; color: #b3b3b3; margin: 30px 0; min-height: 1.5em; }
        
        .history { text-align: left; margin-top: 40px; }
        .entry { 
            background: var(--card); padding: 15px; border-radius: 12px; 
            margin-bottom: 12px; border-left: 5px solid var(--green);
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .entry b { font-size: 18px; display: block; margin-bottom: 4px; }
        .entry small { color: #888; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Bird Journal</h1>
        <button id="recordBtn">LISTEN</button>
        <h2 id="status">Ready to Record</h2>

        <div class="history" id="history">
            <h3>Recent Sightings (Google Sheets)</h3>
            <!-- Entries will appear here live -->
        </div>
    </div>

    <script>
        // YOUR LIVE WEB APP URL
        const SHEET_URL = 'https://script.google.com/macros/s/AKfycbw8ORpLgu2kjM0_d5bweCgiJAV6GpAWqHfKMhjAc2X-3QY4rbqtx7DWQkmISif8Kw59/exec';

        const recordBtn = document.getElementById('recordBtn');
        const statusText = document.getElementById('status');
        const historyDiv = document.getElementById('history');
        
        let isRecording = false;
        let mediaRecorder;
        let audioChunks = [];

        recordBtn.addEventListener('click', async () => {
            if (isRecording) return;

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: 'audio/wav' });
                    analyzeAndLog(blob);
                };

                mediaRecorder.start();
                isRecording = true;
                recordBtn.innerText = "RECORDING";
                recordBtn.style.background = "#ff4444";
                statusText.innerText = "Listening for 5 seconds...";

                setTimeout(() => {
                    if (mediaRecorder.state === "recording") {
                        mediaRecorder.stop();
                        stream.getTracks().forEach(t => t.stop());
                    }
                }, 5000);

            } catch (err) {
                statusText.innerText = "Mic Error: Check Permissions";
            }
        });

        async function analyzeAndLog(blob) {
            recordBtn.innerText = "WAIT";
            statusText.innerText = "Processing sound...";

            const formData = new FormData();
            formData.append('audio', blob, 'recording.wav');

            try {
                // 1. Get Identification from BirdNET
                const birdResp = await fetch('https://corsproxy.io/?url=' + encodeURIComponent('https://birdnet.cornell.edu/api/v1/analyze'), {
                    method: 'POST',
                    body: formData
                });
                const birdData = await birdResp.json();

                if (birdData.results && birdData.results.length > 0) {
                    const birdName = birdData.results[0].species_common_name;
                    const confidence = Math.round(birdData.results[0].confidence * 100);
                    
                    statusText.innerText = `${birdName} Identified!`;

                    // 2. Log to Google Sheet
                    // We use mode: 'no-cors' for Apps Script to avoid browser blocks
                    fetch(SHEET_URL, {
                        method: 'POST',
                        mode: 'no-cors', 
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify({
                            bird: birdName,
                            confidence: confidence,
                            audioUrl: "Local Recording"
                        })
                    });

                    // 3. Update Local UI
                    updateUI(birdName, confidence);

                } else {
                    statusText.innerText = "No bird detected. Try again!";
                }
            } catch (e) {
                console.error(e);
                statusText.innerText = "Connection error. Log failed.";
            } finally {
                recordBtn.innerText = "LISTEN";
                recordBtn.style.background = "var(--green)";
                isRecording = false;
            }
        }

        function updateUI(name, conf) {
            const entry = document.createElement('div');
            entry.className = 'entry';
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            entry.innerHTML = `<b>${name} (${conf}%)</b><small>Logged at ${time}</small>`;
            historyDiv.insertBefore(entry, historyDiv.firstChild.nextSibling);
        }
    </script>
</body>
</html>
