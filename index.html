<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Saco Bird Logger</title></head>
<body style="background:#121212; color:white; text-align:center; padding:50px; font-family:sans-serif;">
    <button id="btn" style="width:200px; height:200px; border-radius:50%; background:#1DB954; color:white; border:none; font-size:24px;">LISTEN</button>
    <p id="status">Ready</p>
    <script>
        const GOOGLE_URL = 'https://script.google.com/macros/s/AKfycbw8ORpLgu2kjM0_d5bweCgiJAV6GpAWqHfKMhjAc2X-3QY4rbqtx7DWQkmISif8Kw59/exec';
        const btn = document.getElementById('btn');
        const status = document.getElementById('status');

        btn.onclick = async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const recorder = new MediaRecorder(stream);
            const chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = async () => {
                status.innerText = "Processing...";
                const blob = new Blob(chunks, { type: 'audio/wav' });
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = async () => {
                    await fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: reader.result.split(',')[1] });
                    status.innerText = "Sent! Check sheet.";
                };
            };
            recorder.start();
            btn.style.background = "#ff4444";
            setTimeout(() => { recorder.stop(); stream.getTracks().forEach(t=>t.stop()); btn.style.background = "#1DB954"; }, 3000);
        };
    </script>
</body>
</html>
